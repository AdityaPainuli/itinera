# Render blueprint: one-click deploy of the FastAPI backend.
# Spin up at https://render.com/deploy after pushing this repo to GitHub.
#
# Render's free tier sleeps the service after ~15 min of inactivity. The first
# request after a sleep will hang ~30s while it cold-starts — fine for a hobby
# itinerary generator. There's no persistent disk on free, so DATABASE_URL must
# point at a managed Postgres (Neon's free tier is what these instructions assume).

services:
  - type: web
    name: itinera-backend
    runtime: python
    plan: free
    region: oregon  # change if you want; Neon has matching regions
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # set in dashboard, do not commit
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-5  # cheaper default for hosted hobby use
      - key: MAX_TOKENS
        value: "8000"
      - key: MAX_WEB_SEARCHES
        value: "6"
      - key: DATABASE_URL
        sync: false   # paste your Neon connection string in the dashboard
      - key: CORS_ORIGINS
        sync: false   # set to your Vercel URL, e.g. https://itinera.vercel.app
      - key: DAILY_REQUEST_LIMIT
        value: "7"
      - key: NOTIFY_WEBHOOK_URL
        sync: false   # optional — Discord/Slack/ntfy.sh URL for limit-hit alerts
      - key: PYTHON_VERSION
        value: "3.12.5"
